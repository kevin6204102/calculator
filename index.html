<!DOCTYPE html>

<html>
<head>
    <title>簡易計算機</title>
    <style> 
body{
    background:#1e1e1e; 
    color:white; 
    font-family:sans-serif; 
} 
input,select{ 
    background:#333; color:white; 
    border:1px solid #555; 
    padding:8px; 
} 
.btn{ 
    background:#4CAF50; 
    color:white; 
    border:none; 
    padding:12px 24px; 
    border-radius:8px; 
    cursor:pointer; 
    font-size:16px; 
} 
.btn:hover{ 
    background:#45a049; 
} 
<style>
</head>
<body>

<h2>簡易計算機</h2>

<input type="number" id="num1">
<select id="operator">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
</select>
<input type="number" id="num2">

<button onclick="calculate()" class="btn">
    計算
</button>

<h3 id="result"></h3>

<script>
function calculate() {
    let num1 = Number(document.getElementById("num1").value);
    let num2 = Number(document.getElementById("num2").value);
    let op = document.getElementById("operator").value;

    let result;

    switch(op) {
        case "+":
            result = num1 + num2;
            break;
        case "-":
            result = num1 - num2;
            break;
        case "*":
            result = num1 * num2;
            break;
        case "/":
            result = num1 / num2;
            break;
    }

    document.getElementById("result").innerText = "結果：" + result;
}
</script>

</body>
</html>
