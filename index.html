<!DOCTYPE html>

<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易計算機</title>

```
<style>
    body {
        background: #1e1e1e;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        background: #2d2d2d;
        padding: 30px;
        border-radius: 16px;
        width: 320px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #555;
        background: #333;
        color: white;
        box-sizing: border-box;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #00ff88;
    }
</style>
```

</head>

<body>

```
<div class="container">
    <h1>簡易計算機</h1>

    <input type="number" id="num1" placeholder="請輸入第一個數字">

    <select id="operator">
        <option value="+">加法 +</option>
        <option value="-">減法 -</option>
        <option value="*">乘法 ×</option>
        <option value="/">除法 ÷</option>
    </select>

    <input type="number" id="num2" placeholder="請輸入第二個數字">

    <button onclick="calculate()">計算</button>

    <div id="result">結果將顯示在這裡</div>
</div>

<script>
    function calculate() {
        const num1 = Number(document.getElementById("num1").value);
        const num2 = Number(document.getElementById("num2").value);
        const operator = document.getElementById("operator").value;

        let result;

        if (document.getElementById("num1").value === "" || document.getElementById("num2").value === "") {
            document.getElementById("result").innerText = "請輸入兩個數字";
            return;
        }

        if (operator === "+") {
            result = num1 + num2;
        } else if (operator === "-") {
            result = num1 - num2;
        } else if (operator === "*") {
            result = num1 * num2;
        } else if (operator === "/") {
            if (num2 === 0) {
                document.getElementById("result").innerText = "除數不能為 0";
                return;
            }
            result = num1 / num2;
        }

        document.getElementById("result").innerText = "結果：" + result;
    }
</script>
```

</body>

</html>
