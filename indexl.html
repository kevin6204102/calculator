<!DOCTYPE html>

<html>
<head>
    <title>簡易計算機</title>
</head>
<body>

<h2>簡易計算機</h2>

<input type="number" id="num1">
<select id="operator">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
</select>
<input type="number" id="num2">

<button onclick="calculate()">計算</button>

<h3 id="result"></h3>

<script>
function calculate() {
    let num1 = Number(document.getElementById("num1").value);
    let num2 = Number(document.getElementById("num2").value);
    let op = document.getElementById("operator").value;

    let result;

    switch(op) {
        case "+":
            result = num1 + num2;
            break;
        case "-":
            result = num1 - num2;
            break;
        case "*":
            result = num1 * num2;
            break;
        case "/":
            result = num1 / num2;
            break;
    }

    document.getElementById("result").innerText = "結果：" + result;
}
</script>

</body>
</html>
